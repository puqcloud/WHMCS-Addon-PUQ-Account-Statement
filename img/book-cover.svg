<svg xmlns="http://www.w3.org/2000/svg" width="440" height="250" viewBox="0 0 440 250">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6c3ce0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="440" height="250" fill="url(#bg)" rx="8"/>

  <!-- Accent line top -->
  <rect x="0" y="0" width="440" height="4" fill="url(#accent)" rx="2"/>

  <!-- Document/statement icon -->
  <g transform="translate(30, 40)">
    <!-- Paper background -->
    <rect x="10" y="5" width="70" height="90" rx="4" fill="none" stroke="#8b5cf6" stroke-width="2.5"/>
    <!-- Fold corner -->
    <path d="M60,5 L80,5 L80,25 L60,25 Z" fill="#16213e" stroke="#8b5cf6" stroke-width="2"/>
    <path d="M60,5 L60,25 L80,5 Z" fill="none" stroke="#8b5cf6" stroke-width="2"/>
    <!-- Header line -->
    <rect x="20" y="18" width="30" height="3" rx="1" fill="#6c3ce0" opacity="0.8"/>
    <!-- Table rows -->
    <line x1="20" y1="32" x2="70" y2="32" stroke="#4a5568" stroke-width="1.5"/>
    <line x1="20" y1="42" x2="70" y2="42" stroke="#4a5568" stroke-width="1.5"/>
    <line x1="20" y1="52" x2="70" y2="52" stroke="#4a5568" stroke-width="1.5"/>
    <line x1="20" y1="62" x2="70" y2="62" stroke="#4a5568" stroke-width="1.5"/>
    <line x1="20" y1="72" x2="70" y2="72" stroke="#4a5568" stroke-width="1.5"/>
    <!-- Column divider -->
    <line x1="50" y1="28" x2="50" y2="78" stroke="#4a5568" stroke-width="1"/>
    <!-- Dollar sign -->
    <text x="60" y="88" font-family="Arial, sans-serif" font-size="12" fill="#8b5cf6" text-anchor="middle" font-weight="bold">$</text>
  </g>

  <!-- Chart/summary icon -->
  <g transform="translate(110, 85)">
    <!-- Bar chart bars -->
    <rect x="0" y="20" width="10" height="25" rx="2" fill="#6c3ce0" opacity="0.5"/>
    <rect x="15" y="10" width="10" height="35" rx="2" fill="#8b5cf6" opacity="0.6"/>
    <rect x="30" y="0" width="10" height="45" rx="2" fill="#a78bfa" opacity="0.5"/>
    <rect x="45" y="15" width="10" height="30" rx="2" fill="#6c3ce0" opacity="0.4"/>
  </g>

  <!-- Module title -->
  <text x="220" y="60" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="white" text-anchor="start">Account</text>
  <text x="220" y="92" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="white" text-anchor="start">Statement</text>

  <!-- Subtitle -->
  <text x="220" y="119" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="start">WHMCS Addon Module</text>

  <!-- Divider -->
  <rect x="220" y="132" width="60" height="2" fill="#6c3ce0" rx="1"/>

  <!-- Description -->
  <text x="220" y="156" font-family="Arial, sans-serif" font-size="11" fill="#64748b" text-anchor="start">Financial statements for clients</text>
  <text x="220" y="172" font-family="Arial, sans-serif" font-size="11" fill="#64748b" text-anchor="start">with PDF, CSV export &amp; scheduling</text>

  <!-- PUQ Cloud branding -->
  <g transform="translate(30, 210)">
    <text x="0" y="15" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#6c3ce0">PUQ</text>
    <text x="55" y="15" font-family="Arial, sans-serif" font-size="12" fill="#64748b">cloud</text>
  </g>

  <!-- Version badge -->
  <g transform="translate(362, 218)">
    <rect x="0" y="0" width="55" height="20" rx="4" fill="#6c3ce0" opacity="0.2" stroke="#6c3ce0" stroke-width="1"/>
    <text x="27" y="14" font-family="Arial, sans-serif" font-size="11" fill="#a78bfa" text-anchor="middle">v1.0.0</text>
  </g>
</svg>
